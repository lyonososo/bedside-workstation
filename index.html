    var res=await fetch(_SB_URL+'/rest/v1/daily_logs?user_id=eq.'+_currentUser.id+'&select=*&order=date.asc',{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY}});

    var logs=await res.json();
    if(logs&&logs.length){
      logs.forEach(function(log){
        var existing=data.logs[log.date];
        if(!existing){
          data.logs[log.date]={shift:log.shift||'rest',count:log.count||0,taxMode:!!log.tax_mode,patients:[],mealBreak:log.meal_break,_timerStart:null,_timerPaused:false,_timerElapsed:0};
        }else{

          existing.count=log.count||existing.count;
          existing.taxMode=!!log.tax_mode;
          if(log.meal_break)existing.mealBreak=log.meal_break;
        }
      });
    }
    saveData();
    _updateSyncDot('ok');
  }catch(e){console.warn('Cloud load error:',e);_updateSyncDot('error');}
}

function calcStreak(){var streak=0,d=new Date();while(true){var ds=d.toISOString().slice(0,10);var l=data.logs[ds];if(l&&l.shift!=='rest'){streak++;d.setDate(d.getDate()-1);}else break;}return streak;}

function calcCalorie(){var l=getLog(today());var w=data.profile.weight||65;var pts=l.patients||[];var done=pts.filter(function(p){return p.status==='done';});
var floors=new Set(done.map(function(p){return p.floor;}));
var timerSec=workTimerSeconds();
var workMin=Math.max(timerSec/60,done.length*8);
var pushMin=done.length*3;var opMin=done.length*5;var waitMin=Math.max(0,workMin-pushMin-opMin);
var cal=(4.0*w*pushMin/60)+(2.5*w*opMin/60)+(1.8*w*waitMin/60);
cal+=floors.size*w*0.02*done.length;
return Math.round(cal);}
function calorieEquiv(cal){var rice=Math.round(cal/116);var tea=Math.round(cal/360);return '≈ '+rice+' 碗米饭 · ≈ '+tea+' 杯奶茶';}

// ===== BATCH ADD =====
function expandBeds(text){
var beds=[];
text.split('\n').forEach(function(line){
  line=line.trim();if(!line)return;
  var m=line.match(/^(.+?)[\-~～](\d+)$/);
  if(m){
    var prefix=m[1];var end=parseInt(m[2]);
    var startMatch=prefix.match(/(\d+)$/);
    if(startMatch){var start=parseInt(startMatch[1]);var pre=prefix.slice(0,-startMatch[1].length);
      for(var i=start;i<=end;i++)beds.push(pre+i+'床');}
    else beds.push(line);
  }else beds.push(line);
});
return beds;
}

// ===== WEATHER =====
function fetchWeather(){
  var c=CAMPUSES.find(function(x){return x.id===state.campus;});
  if(!c)return;
  var url='https://wttr.in/'+c.lat+','+c.lon+'?format=j1';
  fetch(url).then(function(r){return r.json();}).then(function(d){
    if(d&&d.current_condition&&d.current_condition[0]){
      var cur=d.current_condition[0];
      var w={temp:cur.temp_C,humidity:cur.humidity,desc:cur.lang_zh&&cur.lang_zh[0]?cur.lang_zh[0].value:cur.weatherDesc[0].value,wind:cur.windspeedKmph,feels:cur.FeelsLikeC,icon:getWeatherIcon(cur.weatherCode)};
      state.weather=w;
      var el=document.getElementById('weather-bar');
      if(el)el.outerHTML=renderWeatherBar();
    }
  }).catch(function(){});
}
function getWeatherIcon(code){
  code=parseInt(code);
  if(code===113)return'☀️';if(code===116)return'⛅';if(code<=119)return'🌥️';
  if(code<=122)return'☁️';if(code<=200)return'🌧️';if(code<=232)return'⛈️';
  if(code<=260)return'🌨️';if(code<=282)return'🌧️';if(code<=284)return'❄️';
  if(code<=320)return'🌧️';if(code<=395)return'🌨️';return'🌤️';
}
function renderWeatherBar(){
  var c=CAMPUSES.find(function(x){return x.id===state.campus;});
  var w=state.weather;
  var h='<div id="weather-bar" class="card animate-in" style="padding:10px 14px;margin-bottom:12px;cursor:pointer" onclick="showCampusPicker()">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between">';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  if(w){
    h+='<span style="font-size:24px">'+w.icon+'</span>';
    h+='<div><div style="font-size:14px;font-weight:700;color:var(--text)">'+w.temp+'°C <span style="font-weight:400;color:var(--text2)">'+w.desc+'</span></div>';
    h+='<div style="font-size:11px;color:var(--text3)">体感 '+w.feels+'°C · 湿度 '+w.humidity+'% · 风速 '+w.wind+'km/h</div></div>';
  }else{
    h+='<span style="font-size:18px">🌤️</span>';
    h+='<div style="font-size:13px;color:var(--text2)">加载天气中...</div>';
  }
  h+='</div>';
  h+='<div style="display:flex;align-items:center;gap:4px"><span style="font-size:12px;color:var(--text3)">📍</span><span style="font-size:13px;font-weight:600;color:var(--green)">'+c.name+'</span><span style="color:var(--text3);font-size:12px">▼</span></div>';
  h+='</div></div>';
  return h;
}

// Stats grid
h+='<div class="stat-grid animate-in"><div class="stat-item"><div class="stat-value" style="color:var(--green)">'+(log.count||0)+'</div><div class="stat-label">今日床边</div></div>';
h+='<div class="stat-item"><div class="stat-value" style="color:var(--orange)">'+mTotal+'</div><div class="stat-label">本月累计</div></div>';
var mTaxIncome=0;mLogs.forEach(function(l){mTaxIncome+=(l.count||0)*16;});
var incomeVal=state.showTaxIncome?mTaxIncome:mIncome;
var incomeLabel=state.showTaxIncome?'本月税后收入':'本月收入';
h+='<div class="stat-item" style="cursor:pointer" onclick="toggleTaxIncome()"><div class="stat-value" style="color:var(--blue)">¥'+incomeVal+'</div><div class="stat-label">'+incomeLabel+' <span style="font-size:10px;color:var(--text3)">点击切换</span></div></div>';
h+='<div class="stat-item"><div class="stat-value" style="color:var(--purple)">'+(mLogs.length?Math.round(mTotal/mLogs.length):0)+'</div><div class="stat-label">日均床边</div></div></div>';

// Rating card
h+='<div class="rating-card animate-in"><div class="rating-emoji">'+rating.emoji+'</div><div class="rating-title">'+rating.title+'</div>';
h+='<div class="rating-count">今日 '+(log.count||0)+' 床边'+(rating.next>0?' · 距下一等级还需 '+rating.next:'')+'</div>';
h+='<div class="rating-progress"><div class="rating-bar" style="width:'+rating.pct+'%"></div></div></div>';

// Calorie card
h+='<div class="calorie-card animate-in"><div style="display:flex;align-items:center;justify-content:space-between"><div><div class="calorie-value">🔥 '+cal+'</div><div class="calorie-unit">千卡消耗</div><div class="calorie-equiv">'+calorieEquiv(cal)+'</div></div>';
h+='<div class="progress-ring"><svg width="56" height="56"><circle class="ring-bg" cx="28" cy="28" r="24" fill="none" stroke-width="4"/><circle class="ring-fg" cx="28" cy="28" r="24" fill="none" stroke-width="4" stroke-dasharray="'+Math.min(pct,100)*1.508+' 150.8"/></svg><div class="ring-text">'+pct+'%</div></div></div></div>';

// Timer
h+='<div class="card animate-in" style="padding:12px 14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:13px;font-weight:700">⏱️ 工作计时</div><div id="timer-display" style="font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--green)">'+formatTimer(workTimerSeconds())+'</div></div><div style="display:flex;gap:6px"><button class="btn btn-green" style="flex:1;padding:8px;font-size:12px" onclick="toggleWorkTimer()">'+(workTimerRunning()?'⏸ 暂停':'▶ 开始计时')+'</button><button class="btn btn-outline" style="padding:8px;font-size:12px" onclick="resetWorkTimer()">重置</button></div></div>';

h+='</div>';
h+='<div style="padding:0 16px 12px;display:flex;gap:6px;overflow-x:auto">';
var previewFloors=[{id:'6F',n:'手术室'},{id:'8F',n:'重症医学科'},{id:'16F',n:'妇科'},{id:'24F',n:'呼吸病科'},{id:'26F',n:'心血管科'}];
previewFloors.forEach(function(pf){
  h+='<div style="flex-shrink:0;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.18);font-size:11px;font-weight:600">'+pf.id+' '+pf.n+'</div>';
});
h+='</div></div>';

// Quick add
h+='<div class="card animate-in" style="padding:12px 14px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">⚡ 快捷录入</div><div style="display:flex;gap:6px">';
[1,2,3,5,8,10].forEach(function(n){h+='<button class="btn btn-outline" style="flex:1;padding:8px;font-size:13px;font-weight:700" onclick="quickAdd('+n+')">+'+n+'</button>';});
h+='</div></div>';

// Streak
var streak=calcStreak();
if(streak>0){h+='<div class="card animate-in" style="padding:12px 14px;background:linear-gradient(135deg,#FF9500,#FF6B00);color:#fff;border:none"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:28px">🔥</div><div style="flex:1"><div style="font-size:15px;font-weight:800">连续 '+streak+' 天出勤</div><div style="font-size:11px;opacity:.8">坚持就是胜利！</div></div></div></div>';}

// Meal break
if(log.mealBreak&&!log.mealBreak.end){
  h+='<div class="meal-banner animate-in"><span style="font-size:22px">🍽️</span><div class="info"><div class="title">休息中</div><div class="time">从 '+log.mealBreak.start+' 开始</div></div>';
  h+='<button class="btn-end" onclick="endMeal()">结束休息</button></div>';}

// Handover reminder
if(data.handover){h+='<div class="card animate-in" style="padding:12px 14px;border-left:3px solid var(--orange)"><div style="font-size:12px;font-weight:700;color:var(--orange);margin-bottom:4px">📝 交接备忘</div><div style="font-size:13px;color:var(--text2)">'+data.handover+'</div></div>';}

// Patient list
h+='<div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px"><div style="font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px">📋 今日拍片清单</div><button class="btn btn-green" style="padding:8px 20px;font-size:14px;font-weight:800;border-radius:10px" onclick="showAddPt()">+ 添加任务</button></div>';
if(!pts.length){h+='<div class="card"><div class="empty-state"><div class="emoji">📋</div><div class="text">暂无拍片任务</div></div></div>';}
else{
  // Group by floor
  var groups={};
  pts.forEach(function(p,i){if(!groups[p.floor])groups[p.floor]=[];groups[p.floor].push({p:p,idx:i});});
  // Sort: urgent first
  Object.keys(groups).forEach(function(k){groups[k].sort(function(a,b){return(b.p.urgent?1:0)-(a.p.urgent?1:0);});});
  var floorOrder=FLOORS.map(function(f){return f.id;});
  floorOrder.forEach(function(floor){
    if(!groups[floor])return;
    var items=groups[floor];
    var floorInfo=FLOORS.find(function(x){return x.id===floor;});
    var floorLabel=floorInfo?(floor+' '+floorInfo.name):floor;
    h+='<div class="floor-group animate-in"><div class="floor-header">📍 '+floorLabel+' <span class="floor-count">'+items.length+'项</span></div>';
    items.forEach(function(item){
      var p=item.p;var i=item.idx;
      h+='<div class="check-item '+(p.status==='done'?'done':'')+' '+(p.urgent?'urgent':'')+'" onclick="showPtDetail('+i+')">';
      h+='<div class="check-name">'+p.bed;
      (p.markers||[]).forEach(function(m){h+=' <span class="tag tag-orange" style="font-size:9px">'+m+'</span>';});
      if(p.quality===3)h+=' ⭐';
      h+='</div>';
      h+='<span class="check-tag tag-green">'+({chest:'胸',abdomen:'腹',both:'胸腹',limb:'四肢',spine:'脊柱',other:'其他'}[p.type]||p.type)+'</span>';
      if(p.time)h+='<span style="font-size:10px;color:var(--text3)">'+p.time+'</span>';
      h+='<div class="check-actions">';
      h+='<button class="check-btn '+(p.status==='done'?'btn-done':'')+'" onclick="event.stopPropagation();togPt('+i+')">'+(p.status==='done'?'✓':'○')+'</button>';
      h+='<button class="check-btn" onclick="event.stopPropagation();rmPt('+i+')" style="color:var(--red)">×</button>';
      h+='</div></div>';
    });
    h+='</div>';
  });
  // Ungrouped
  Object.keys(groups).forEach(function(floor){if(floorOrder.indexOf(floor)===-1){
    var items=groups[floor];
    h+='<div class="floor-group animate-in"><div class="floor-header">📍 '+floor+' <span class="floor-count">'+items.length+'项</span></div>';
    items.forEach(function(item){var p=item.p;var i=item.idx;
      h+='<div class="check-item '+(p.status==='done'?'done':'')+'" onclick="showPtDetail('+i+')"><div class="check-name">'+p.bed+'</div>';
      h+='<div class="check-actions"><button class="check-btn '+(p.status==='done'?'btn-done':'')+'" onclick="event.stopPropagation();togPt('+i+')">'+(p.status==='done'?'✓':'○')+'</button>';
      h+='<button class="check-btn" onclick="event.stopPropagation();rmPt('+i+')" style="color:var(--red)">×</button></div></div>';});
    h+='</div>';
  }});
}
return h;
}

function renderSchedule(){
var ym=state.calMonth||today().slice(0,7);var p=ym.split('-').map(Number);var y=p[0],m=p[1];
var days=monthDays(ym);var firstDay=new Date(y,m-1,1).getDay();var td=today();
var h='<div class="view-header"><div class="view-title">排班</div><div class="view-subtitle">点击日期设置班次</div></div>';
h+='<div class="cal-nav" style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:8px"><div class="btn btn-sm btn-outline" onclick="chMonth(-1)">‹</div><div style="font-size:15px;font-weight:800">'+y+'年'+m+'月</div><div class="btn btn-sm btn-outline" onclick="chMonth(1)">›</div></div>';
h+='<div class="cal">';
['日','一','二','三','四','五','六'].forEach(function(d){h+='<div class="cal-hd">'+d+'</div>';});
for(var i=0;i<firstDay;i++)h+='<div></div>';
for(var d=1;d<=days;d++){
  var ds=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  var l=data.logs[ds];var cls='cal-day';
  if(ds===td)cls+=' today';
  if(l&&l.shift==='rest')cls+=' rest';
  else if(l)cls+=' work';
  h+='<div class="'+cls+'" onclick="setShift(\''+ds+'\')">'+d+'</div>';
}

function renderStats(){

// Summary
var mLogs=monthLogs(ym);var mTotal=0,mIncome=0;

function filterFloors(){
var q=document.getElementById('floor-search').value.trim().toLowerCase();
var items=document.querySelectorAll('#floor-list .floor-item');
items.forEach(function(el){
  var name=el.getAttribute('data-name').toLowerCase();
  el.style.display=(!q||name.indexOf(q)>-1)?'flex':'none';
});
}

// ===== USER MANUAL =====
function showManual(){
var h='<div style="padding:10px 0"><div style="text-align:center;margin-bottom:20px"><div style="font-size:40px">📖</div><div style="font-size:20px;font-weight:900;margin-top:8px">使用说明书</div></div>';
var sections=[
  {icon:'📋',title:'添加拍片任务',desc:'点击工作台「今日拍片清单」旁的「+ 添加」按钮。支持单个添加和批量添加两种模式。'},
  {icon:'📦',title:'批量添加',desc:'切换到「批量添加」模式，楼层和部位只需选一次。选择楼层后科室自动填入。床号每行一个，支持连续格式如 8F-1~10，自动展开为1到10床。'},
  {icon:'⭐',title:'常用床号',desc:'在「我的」→「常用床号管理」中收藏高频床号。添加任务时可以一键导入，不用重复输入。'},
  {icon:'✅',title:'完成任务',desc:'点击任务右侧的 ○ 按钮标记完成，再次点击取消。点击任务卡片可以查看详情、设置图像质量和紧急标记。'},
  {icon:'⚡',title:'快捷录入',desc:'工作台上的 +1/+2/+3/+5/+8/+10 按钮可以快速增加今日床边计数，适合批量拍完后一次性录入。'},
  {icon:'⏱️',title:'工作计时',desc:'点击「开始计时」记录工作时长，支持暂停和重置。计时数据会影响卡路里计算。'},
  {icon:'🔥',title:'卡路里计算',desc:'在「我的」→「身体数据」中填写身高体重，系统会根据 MET 代谢当量精确计算每日消耗，并换算成米饭和奶茶。'},
  {icon:'🏆',title:'成就系统',desc:'分为月度成就、年度成就和特殊成就三类。月度和年度按累计床边数评定，特殊成就需要完成特定挑战。'},
  {icon:'📅',title:'排班管理',desc:'在「排班」页面点击日期设置班次（白班/夜班/休息）。排班数据会影响统计和收入计算。'},
  {icon:'📝',title:'交接班备忘',desc:'记录未完成的任务和需要跟进的事项，下次打开 App 自动显示提醒。'},
  {icon:'📞',title:'科室快捷电话',desc:'在「我的」→「科室快捷电话」中保存各科室联系方式，随时查看。'},
  {icon:'📐',title:'曝光参数速查',desc:'常见部位的 kV/mAs/SID 参考值卡片，遇到不常见的体型可以快速查阅。'},
  {icon:'🏥',title:'楼层导航',desc:'在「我的」→「楼层导航」中查看全院 6F~29F 的科室分布。支持搜索，输入科室名即可快速定位楼层。'},
  {icon:'📊',title:'月度报告',desc:'自动生成本月工作量、收入、日均等数据汇总，截图即可汇报。'},
  {icon:'🌙',title:'深色模式',desc:'在「我的」页面底部切换深色/浅色模式，夜间使用更护眼。'}
];
sections.forEach(function(s){
  h+='<div class="report-card" style="margin-bottom:10px"><h3>'+s.icon+' '+s.title+'</h3><div style="font-size:13px;color:var(--text2);line-height:1.6">'+s.desc+'</div></div>';
});
h+='</div>';
h+='<div onclick="closeModal()" style="text-align:center;padding:10px;border-radius:12px;background:var(--card2);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px">关闭</div>';
openModal(h,true);
}

// ===== UTILITY =====
function chMonth(d){var ym=state.calMonth||today().slice(0,7);var p=ym.split('-').map(Number);var dt=new Date(p[0],p[1]-1+d,1);state.calMonth=dt.toISOString().slice(0,7);render();}
function setShift(ds){
var l=getLog(ds);var shifts=['day','night','rest'];var labels=['白班','夜班','休息'];
var h='<div style="font-size:18px;font-weight:800;margin-bottom:14px">'+fmtDate(ds)+' 班次</div>';
shifts.forEach(function(s,i){
  h+='<div style="display:flex;align-items:center;gap:12px;padding:14px;background:'+(l.shift===s?'var(--green3)':'var(--card2)')+';border-radius:var(--radius3);margin-bottom:8px;cursor:pointer" onclick="getLog(\''+ds+'\').shift=\''+s+'\';saveData();closeModal();render();">';
  h+='<span style="font-size:20px">'+({day:'☀️',night:'🌙',rest:'😴'}[s])+'</span><span style="flex:1;font-size:15px;font-weight:700">'+labels[i]+'</span>';
  if(l.shift===s)h+='<span style="color:var(--green);font-weight:700">✓</span>';
  h+='</div>';});
h+='<div onclick="closeModal()" style="margin-top:12px;text-align:center;padding:10px;border-radius:12px;background:var(--card2);font-size:14px;font-weight:600;cursor:pointer">取消</div>';
openModal(h);
}
function showDayDetail(ds){
var l=data.logs[ds];if(!l){toast('该日无记录');return;}
var h='<div style="font-size:18px;font-weight:800;margin-bottom:14px">'+fmtDate(ds)+' 详情</div>';
h+='<div class="report-card"><h3>班次</h3><div class="report-row"><span class="label">类型</span><span class="value">'+({day:'白班',night:'夜班',rest:'休息'}[l.shift]||'未知')+'</span></div>';
h+='<div class="report-row"><span class="label">床边数</span><span class="value">'+(l.count||0)+'</span></div>';
h+='<div class="report-row"><span class="label">收入</span><span class="value">¥'+((l.count||0)*(l.taxMode?0.6:1)*30)+'</span></div></div>';
if(l.patients&&l.patients.length){
  h+='<div class="report-card"><h3>任务明细</h3>';
  l.patients.forEach(function(p){h+='<div class="report-row"><span class="label">'+p.bed+' '+p.floor+'</span><span class="value">'+(p.status==='done'?'✅ '+p.time:'⏳')+'</span></div>';});
  h+='</div>';}
h+='<div onclick="closeModal()" style="margin-top:12px;text-align:center;padding:10px;border-radius:12px;background:var(--card2);font-size:14px;font-weight:600;cursor:pointer">关闭</div>';
openModal(h,true);
}
function doReset(){data.logs={};data.profile={name:'',height:0,weight:0,hospital:'',dept:''};data.favorites=[];data.contacts=[{name:'ICU',phone:'',icon:'🏥'},{name:'急诊科',phone:'',icon:'🚑'},{name:'3F 外科',phone:'',icon:'🔪'}];data.notes=[];data.handover='';data.achievements={};saveData();closeModal();render();toast('✅ 已还原所有数据')}

// ===== CHECK ACHIEVEMENTS =====
function checkAchievements(){
SPECIAL_ACH.forEach(function(a){
  if(!data.achievements[a.id]&&a.check()){
    data.achievements[a.id]=new Date().toLocaleString('zh-CN');
    toast('🎉 解锁成就：'+a.t);
  }
});
saveData();
}

// ===== INIT =====
(function(){
  _initSB();
  loadData();
  applyTheme();
  state.calMonth=today().slice(0,7);
  state.addMode='single';
  try{var savedCampus=localStorage.getItem('gdhtcm_campus');if(savedCampus)state.campus=savedCampus;}catch(e){}
  try{state.showTaxIncome=localStorage.getItem('gdhtcm_tax')==='1';}catch(e){}
  // Skip login, go straight to app
  setTimeout(function(){
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('show');
    render();
    if(!data._onboarded)setTimeout(function(){showOnboarding();},500);
    fetchWeather();
    _loadFromCloud().then(function(){render();});
  },1500);
  // Auth handled by simple name+password login
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
  document.addEventListener('visibilitychange',function(){if(document.hidden){saveData();checkAchievements();}});
  setInterval(checkAchievements,60000);
  window.addEventListener('online',function(){if(_currentUser)_syncToCloud();});
  window.addEventListener('offline',function(){_updateSyncDot('error');});
})();
</script>
