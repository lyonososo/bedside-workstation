<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="省中医工作站">
<meta name="theme-color" content="#006B3F">
<link rel="manifest" href="manifest.json">
<title>广东省中医院 · 放射科工作站</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

:root{--green:#006B3F;--green2:#00875A;--green3:rgba(0,107,63,.08);--red:#C41230;--red2:#FF3B30;--orange:#FF9500;--blue:#007AFF;--purple:#AF52DE;--teal:#5AC8FA;--pink:#FF2D55;--bg:#F2F2F7;--card:#FFFFFF;--card2:#F9F9F9;--input:#F2F2F7;--text:#1C1C1E;--text2:#8E8E93;--text3:#AEAEB2;--border:rgba(0,0,0,.06);--shadow:0 1px 8px rgba(0,0,0,.04),0 0 1px rgba(0,0,0,.06);--radius:16px;--radius2:12px;--radius3:8px;--safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,0px);--glass:rgba(255,255,255,.72);}
.dark{--bg:#000000;--card:#1C1C1E;--card2:#2C2C2E;--input:#2C2C2E;--text:#FFFFFF;--text2:#98989F;--text3:#48484A;--border:rgba(255,255,255,.08);--shadow:0 1px 8px rgba(0,0,0,.2);--green3:rgba(0,135,90,.12);--glass:rgba(28,28,30,.78);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh;-webkit-font-smoothing:antialiased;user-select:none;transition:background .3s,color .3s;}
input,select,textarea{font-family:inherit;user-select:text;}
#splash{position:fixed;inset:0;z-index:9999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none;}
.dark #splash{background:#000;}
.splash-logo{width:120px;height:120px;border-radius:24px;object-fit:contain;animation:splashLogo 1s cubic-bezier(.2,.8,.2,1) both;box-shadow:0 8px 32px rgba(0,107,63,.15);}
@keyframes splashLogo{from{opacity:0;transform:scale(.6) translateY(30px);}to{opacity:1;transform:none;}}
.splash-title{color:var(--text);font-size:20px;font-weight:800;letter-spacing:3px;margin-top:20px;animation:splashText .8s .3s ease-out both;}
.splash-sub{color:var(--text2);font-size:11px;font-weight:500;letter-spacing:.5px;margin-top:6px;text-align:center;line-height:1.5;padding:0 40px;animation:splashText .8s .5s ease-out both;}
@keyframes splashText{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.splash-loader{margin-top:36px;width:32px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;animation:splashText .8s .7s ease-out both;}
.splash-loader::after{content:'';display:block;width:0;height:100%;background:var(--green);border-radius:2px;animation:load 1.8s ease-in-out infinite;}
@keyframes load{0%{width:0;margin-left:0;}50%{width:100%;margin-left:0;}100%{width:0;margin-left:100%;}}
.splash-ver{position:absolute;bottom:calc(var(--safe-bottom) + 20px);color:var(--text3);font-size:10px;font-weight:500;letter-spacing:1px;animation:splashText .8s .9s ease-out both;}
#app{display:none;height:100vh;height:100dvh;flex-direction:column;}
#app.show{display:flex;}
.view{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(82px + var(--safe-bottom));}
.view.active{display:block;}
.view-header{padding:calc(var(--safe-top) + 6px) 20px 10px;position:sticky;top:0;z-index:10;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.view-title{font-size:34px;font-weight:900;letter-spacing:-.5px;line-height:1.1;}
.view-subtitle{font-size:13px;color:var(--text2);margin-top:3px;font-weight:500;}
.view-content{padding:0 16px 24px;}
#tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:.5px solid var(--border);padding:4px 0 calc(4px + var(--safe-bottom));display:flex;justify-content:space-around;}
.tab{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 14px;cursor:pointer;transition:all .2s;opacity:.35;position:relative;}
.tab.active{opacity:1;}
.tab.active::before{content:'';position:absolute;top:-4px;width:20px;height:3px;background:var(--green);border-radius:2px;}
.tab-icon{font-size:22px;line-height:1;transition:transform .2s;}
.tab.active .tab-icon{transform:scale(1.1);}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.3px;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);border:.5px solid var(--border);transition:background .3s,border-color .3s;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-item{background:var(--card2);border-radius:var(--radius2);padding:14px 12px;text-align:center;transition:background .3s;}
.stat-value{font-size:26px;font-weight:900;line-height:1.1;letter-spacing:-.5px;}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500;}
.income-hero{text-align:center;padding:24px 16px;background:linear-gradient(145deg,var(--green),#004D2E);border-radius:20px;color:#fff;margin-bottom:10px;position:relative;overflow:hidden;}
.income-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%;}
.income-hero::after{content:'';position:absolute;bottom:-30px;left:-30px;width:80px;height:80px;background:rgba(255,255,255,.04);border-radius:50%;}
.income-amount{font-size:44px;font-weight:900;letter-spacing:-2px;position:relative;z-index:1;}
.income-label{font-size:12px;opacity:.7;margin-top:4px;font-weight:500;position:relative;z-index:1;}
.income-toggle{display:flex;gap:4px;justify-content:center;margin-top:14px;position:relative;z-index:1;}
.toggle-btn{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.6);transition:all .2s;}
.toggle-btn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.4);}
.quick-input{display:flex;gap:8px;align-items:center;}
.quick-input input{flex:1;height:46px;border-radius:var(--radius2);border:1.5px solid var(--border);background:var(--input);padding:0 14px;font-size:20px;font-weight:700;text-align:center;color:var(--text);transition:all .2s;}
.quick-input input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,107,63,.1);}
.quick-input button{height:46px;padding:0 20px;border-radius:var(--radius2);border:none;background:var(--green);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.quick-input button:active{transform:scale(.96);opacity:.85;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border);}
.check-item:last-child{border:none;}
.check-box{width:22px;height:22px;border-radius:50%;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;flex-shrink:0;}
.check-box.done{background:var(--green);border-color:var(--green);animation:checkPop .3s ease;}
@keyframes checkPop{50%{transform:scale(1.2);}}
.check-box.done::after{content:'✓';color:#fff;font-size:11px;font-weight:800;}
.check-box.paused{background:var(--orange);border-color:var(--orange);}
.check-box.paused::after{content:'⏸';color:#fff;font-size:9px;font-weight:700;}
.check-info{flex:1;min-width:0;}
.check-bed{font-size:14px;font-weight:600;}
.check-meta{font-size:11px;color:var(--text2);margin-top:1px;}
.check-act{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;background:var(--card2);border:1px solid var(--border);transition:all .15s;}
.check-act:active{transform:scale(.85);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--card);border:1px solid var(--border);font-size:15px;transition:all .15s;box-shadow:var(--shadow);}
.cal-nav-btn:active{transform:scale(.9);}
.cal-month{font-size:17px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-weekday{text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:6px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;transition:all .15s;position:relative;font-size:14px;font-weight:600;}
.cal-day:active{transform:scale(.9);}
.cal-day.today{background:var(--green);color:#fff;font-weight:700;}
.cal-day .dot{width:4px;height:4px;border-radius:50%;position:absolute;bottom:3px;}
.cal-day.today .dot{background:rgba(255,255,255,.7)!important;}
.dot-bedside{background:var(--green);}.dot-night{background:var(--purple);}.dot-normal{background:var(--blue);}.dot-rest{background:var(--text3);}
.floor-section{margin-bottom:6px;}
.floor-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-radius:var(--radius2);cursor:pointer;box-shadow:var(--shadow);border:.5px solid var(--border);transition:all .15s;}
.floor-header:active{transform:scale(.98);opacity:.9;}
.floor-num{width:36px;height:36px;border-radius:9px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.floor-info{flex:1;min-width:0;}
.floor-name{font-size:14px;font-weight:700;line-height:1.3;}
.floor-dept{font-size:11px;color:var(--text2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.floor-arrow{color:var(--text3);font-size:13px;transition:transform .3s;}
.floor-arrow.open{transform:rotate(90deg);}
.floor-body{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.floor-body.open{max-height:400px;}
.floor-detail{padding:10px 14px;background:var(--card2);border-radius:0 0 var(--radius2) var(--radius2);margin-top:-1px;font-size:12px;color:var(--text2);line-height:1.6;}
.floor-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;margin:2px 3px 2px 0;background:var(--green3);color:var(--green);cursor:pointer;transition:all .15s;}
.floor-tag:active{transform:scale(.95);}
.floor-tag.highlight{background:rgba(255,149,0,.1);color:var(--orange);}
.hb-section{margin-bottom:8px;}
.hb-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:.5px solid var(--border);transition:background .3s;}
.hb-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;}
.hb-header:active{background:var(--card2);}
.hb-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hb-title{flex:1;font-size:15px;font-weight:700;}
.hb-arrow{color:var(--text3);font-size:13px;transition:transform .3s;}
.hb-arrow.open{transform:rotate(90deg);}
.hb-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);}
.hb-body.open{max-height:3000px;}
.hb-content{padding:0 16px 16px;font-size:13px;line-height:1.7;color:var(--text2);}
.hb-content h4{color:var(--text);font-size:14px;font-weight:700;margin:14px 0 6px;}
.hb-content h4:first-child{margin-top:0;}
.hb-content table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;}
.hb-content th,.hb-content td{padding:8px 10px;text-align:left;border-bottom:.5px solid var(--border);}
.hb-content th{font-weight:700;color:var(--text);background:var(--card2);font-size:11px;}
.hb-content ul{padding-left:16px;}
.hb-content li{margin-bottom:4px;}
.hb-content .tip{background:var(--green3);border-radius:var(--radius3);padding:10px 12px;margin:8px 0;font-size:12px;color:var(--green);font-weight:500;}
.hb-content .warn{background:rgba(255,59,48,.06);border-radius:var(--radius3);padding:10px 12px;margin:8px 0;font-size:12px;color:var(--red2);font-weight:500;}
.rating-card{text-align:center;padding:22px 16px;background:linear-gradient(145deg,var(--green),#004D2E);border-radius:20px;color:#fff;margin-bottom:10px;position:relative;overflow:hidden;}
.rating-card::before{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:rgba(255,255,255,.04);border-radius:50%;}
.rating-emoji{font-size:44px;margin-bottom:6px;}
.rating-title{font-size:22px;font-weight:900;margin-bottom:2px;}
.rating-count{font-size:13px;opacity:.75;}
.rating-progress{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:14px;overflow:hidden;}
.rating-bar{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.profile-hero{text-align:center;padding:28px 20px 20px;}
.profile-avatar{width:72px;height:72px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;border:3px solid var(--border);transition:all .2s;position:relative;overflow:hidden;}
.profile-avatar:active{transform:scale(.95);}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.profile-name{font-size:20px;font-weight:800;}
.profile-title{font-size:13px;color:var(--text2);margin-top:2px;font-weight:500;}
.profile-edit{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:var(--card2);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;margin-top:8px;border:1px solid var(--border);transition:all .15s;}
.profile-edit:active{transform:scale(.95);}
.settings-list{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:.5px solid var(--border);margin-bottom:10px;}
.sl-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:.5px solid var(--border);transition:background .15s;}
.sl-item:last-child{border:none;}
.sl-item:active{background:var(--card2);}
.sl-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sl-text{flex:1;min-width:0;}
.sl-title{font-size:14px;font-weight:600;}
.sl-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.sl-arrow{color:var(--text3);font-size:13px;}
.section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px;padding:0 2px;}
.empty-state{text-align:center;padding:36px 20px;color:var(--text3);}
.empty-state .emoji{font-size:44px;margin-bottom:10px;}
.empty-state .text{font-size:13px;font-weight:500;}
.btn{padding:11px 22px;border-radius:var(--radius2);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:active{transform:scale(.96);}
.btn-green{background:var(--green);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:var(--red2);color:#fff;}
.btn-full{width:100%;justify-content:center;}
.shift-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.shift-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.shift-dot{width:7px;height:7px;border-radius:50%;}
.search-box{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:var(--radius2);background:var(--card);border:1.5px solid var(--border);margin-bottom:10px;box-shadow:var(--shadow);}
.search-box input{flex:1;border:none;background:none;font-size:14px;color:var(--text);outline:none;}
.search-box .icon{color:var(--text3);font-size:14px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);width:48px;flex-shrink:0;}
.form-input{flex:1;height:40px;border-radius:var(--radius3);border:1.5px solid var(--border);background:var(--input);padding:0 12px;font-size:14px;color:var(--text);transition:border-color .2s;}
.form-input:focus{outline:none;border-color:var(--green);}
.form-select{flex:1;height:40px;border-radius:var(--radius3);border:1.5px solid var(--border);background:var(--input);padding:0 12px;font-size:14px;color:var(--text);appearance:none;}
.meal-banner{background:linear-gradient(135deg,var(--orange),#E68600);border-radius:var(--radius2);padding:12px 14px;color:#fff;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.meal-banner .info{flex:1;}
.meal-banner .title{font-size:14px;font-weight:700;}
.meal-banner .time{font-size:11px;opacity:.8;}
.meal-banner .btn-end{padding:5px 14px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;cursor:pointer;border:none;}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0;}
.avatar-opt{width:100%;aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--card2);}
.avatar-opt:active{transform:scale(.9);}
.avatar-opt.sel{border-color:var(--green);background:var(--green3);}
.about-card{text-align:center;padding:24px 16px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:.5px solid var(--border);}
.about-logo{width:56px;height:56px;border-radius:14px;margin:0 auto 10px;object-fit:contain;}
.about-name{font-size:15px;font-weight:800;color:var(--text);}
.about-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.about-dev{font-size:11px;color:var(--text3);margin-top:8px;}
.about-ver{font-size:10px;color:var(--text3);margin-top:2px;}
#modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#modal-overlay.active{opacity:1;pointer-events:auto;}
#modal-sheet{width:100%;max-width:500px;max-height:85vh;background:var(--card);border-radius:20px 20px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-bottom);}
#modal-overlay.active #modal-sheet{transform:none;}
.modal-handle{width:36px;height:4px;background:var(--text3);border-radius:2px;margin:8px auto 0;opacity:.4;}
.modal-content{padding:16px 20px 28px;}
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-100px);z-index:999;padding:10px 20px;border-radius:100px;background:var(--text);color:var(--bg);font-size:13px;font-weight:600;white-space:nowrap;transition:transform .4s cubic-bezier(.32,.72,0,1);box-shadow:0 4px 24px rgba(0,0,0,.15);}
.toast.show{transform:translateX(-50%) translateY(0);}
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}


#login-page{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity .4s,transform .4s}
#login-page.hide{opacity:0;transform:scale(.95);pointer-events:none}
.login-logo{width:80px;height:80px;border-radius:20px;margin-bottom:16px;object-fit:cover}
.login-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;text-align:center}
.login-form{width:100%;max-width:320px}
.login-input{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:16px;font-weight:500;outline:none;transition:border-color .2s;box-sizing:border-box}
.login-input:focus{border-color:var(--green)}
.login-input::placeholder{color:var(--text3)}
.login-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--green);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;transition:opacity .2s}
.login-btn:active{opacity:.7}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.6}
.login-error{color:var(--red2);font-size:13px;text-align:center;margin-top:8px;min-height:20px}

<script>

var DB_KEY='gdhtcm_v2';
var SB_URL= + SB_URL + ;
var SB_KEY= + SB_KEY + ;
var supabaseClient=null;
var currentUser=null;
var state={tab:'work',calMonth:ymStr(),searchFloor:''};
var data=null;
var syncTimer=null;
var isOnline=navigator.onLine;

function ymStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function defaultData(){return{profile:{name:'技师',title:'初级技师',avatar:'',avatarType:'emoji',avatarEmoji:'👨‍⚕️'},logs:{},favorites:[],darkMode:false};}
function today(){return new Date().toISOString().slice(0,10);}
function getLog(day){if(!data.logs[day])data.logs[day]={shift:'rest',count:0,taxMode:false,patients:[],mealBreak:null};return data.logs[day];}
function monthDays(ym){var p=ym.split('-').map(Number);return new Date(p[0],p[1],0).getDate();}
function monthKey(d){return d.slice(0,7);}

// ===== LOCAL STORAGE =====
function saveDataLocal(){localStorage.setItem(DB_KEY,JSON.stringify(data));}
function loadDataLocal(){try{var d=JSON.parse(localStorage.getItem(DB_KEY));if(d&&d.profile&&d.logs)return d;}catch(e){}return null;}

// ===== SUPABASE =====
function initSupabase(){
  supabaseClient=window.supabase.createClient(SB_URL,SB_KEY,{
    auth:{autoRefreshToken:true,persistSession:true,detectSessionInUrl:true}
  });
}

async function checkSession(){
  try{
    var{data:{session}}=await supabaseClient.auth.getSession();
    if(session&&session.user){
      currentUser=session.user;
      return true;
    }
  }catch(e){console.error('Session check error:',e);}
  return false;
}

async function handleLogin(){
  var email=document.getElementById('login-email').value.trim();
  var errEl=document.getElementById('login-error');
  var btn=document.getElementById('login-btn');
  if(!email||!email.includes('@')){errEl.textContent='请输入有效邮箱';return;}
  errEl.textContent='';
  btn.disabled=true;
  btn.textContent='发送中...';
  try{
    var{error}=await supabaseClient.auth.signInWithOtp({email:email,options:{emailRedirectTo:window.location.origin+window.location.pathname}});
    if(error)throw error;
    errEl.style.color='var(--green)';
    errEl.textContent='✅ 已发送！请查收邮箱点击登录链接';
    btn.textContent='已发送';
    setTimeout(function(){btn.disabled=false;btn.textContent='重新发送';errEl.style.color='';errEl.textContent='';},5000);
  }catch(e){
    errEl.style.color='var(--red2)';
    errEl.textContent=e.message||'发送失败，请重试';
    btn.disabled=false;
    btn.textContent='发送登录链接';
  }
}

async function loadFromCloud(){
  if(!currentUser)return;
  try{
    var[profileRes,logsRes,patientsRes,favsRes]=await Promise.all([
      supabaseClient.from('profiles').select('*').eq('id',currentUser.id).single(),
      supabaseClient.from('daily_logs').select('*').eq('user_id',currentUser.id).order('date'),
      supabaseClient.from('patients').select('*').eq('user_id',currentUser.id).order('log_date'),
      supabaseClient.from('favorites').select('*').eq('user_id',currentUser.id)
    ]);
    var localData=loadDataLocal();
    var cloudData=defaultData();
    if(profileRes.data){
      var p=profileRes.data;
      cloudData.profile={name:p.name||'技师',title:p.title||'初级技师',avatar:p.avatar||'',avatarType:p.avatar_type||'emoji',avatarEmoji:p.avatar_emoji||'👨‍⚕️'};
      cloudData.darkMode=!!p.dark_mode;
    }
    cloudData.logs={};
    if(logsRes.data){
      logsRes.data.forEach(function(log){
        cloudData.logs[log.date]={shift:log.shift||'rest',count:log.count||0,taxMode:!!log.tax_mode,patients:[],mealBreak:log.meal_break};
      });
    }
    if(patientsRes.data){
      patientsRes.data.forEach(function(pt){
        var dateKey=pt.log_date;
        if(cloudData.logs[dateKey]){
          cloudData.logs[dateKey].patients.push({bed:pt.bed,floor:pt.floor,type:pt.type,status:pt.status,note:pt.note,time:pt.time});
        }
      });
    }
    cloudData.favorites=[];
    if(favsRes.data){
      favsRes.data.forEach(function(f){cloudData.favorites.push(f.name);});
    }
    // Merge: if local has more recent data for today, keep local
    if(localData){
      var todayKey=today();
      if(localData.logs[todayKey]&&cloudData.logs[todayKey]){
        var localPatients=localData.logs[todayKey].patients||[];
        var cloudPatients=cloudData.logs[todayKey].patients||[];
        if(localPatients.length>cloudPatients.length){
          cloudData.logs[todayKey]=localData.logs[todayKey];
        }
      }
      // Keep local profile name if cloud is default
      if(cloudData.profile.name==='技师'&&localData.profile.name!=='技师'){
        cloudData.profile.name=localData.profile.name;
      }
    }
    data=cloudData;
    saveDataLocal();
    updateSyncBadge('ok');
  }catch(e){
    console.error('Load from cloud error:',e);
    // Fallback to local
    data=loadDataLocal()||defaultData();
    updateSyncBadge('error');
  }
}

var syncQueue=[];
function queueSync(){clearTimeout(syncTimer);syncTimer=setTimeout(function(){syncToCloud();},1500);}

async function syncToCloud(){
  if(!currentUser||!data)return;
  updateSyncBadge('syncing');
  try{
    // Upsert profile
    await supabaseClient.from('profiles').upsert({
      id:currentUser.id,
      name:data.profile.name,
      title:data.profile.title,
      avatar:data.profile.avatar||null,
      avatar_type:data.profile.avatarType,
      avatar_emoji:data.profile.avatarEmoji,
      dark_mode:data.darkMode
    },{onConflict:'id'});
    // Sync daily_logs
    var dates=Object.keys(data.logs);
    for(var i=0;i<dates.length;i++){
      var dateKey=dates[i];
      var log=data.logs[dateKey];
      await supabaseClient.from('daily_logs').upsert({
        user_id:currentUser.id,
        date:dateKey,
        shift:log.shift,
        count:log.count,
        tax_mode:log.taxMode,
        meal_break:log.mealBreak||null
      },{onConflict:'user_id,date'});
      // Sync patients for this date
      await supabaseClient.from('patients').delete().eq('user_id',currentUser.id).eq('log_date',dateKey);
      if(log.patients&&log.patients.length){
        var pts=log.patients.map(function(p){return{user_id:currentUser.id,log_date:dateKey,bed:p.bed,floor:p.floor,type:p.type,status:p.status,note:p.note,time:p.time};});
        await supabaseClient.from('patients').insert(pts);
      }
    }
    // Sync favorites
    await supabaseClient.from('favorites').delete().eq('user_id',currentUser.id);
    if(data.favorites&&data.favorites.length){
      var favs=data.favorites.map(function(name){return{user_id:currentUser.id,name:name};});
      await supabaseClient.from('favorites').insert(favs);
    }
    updateSyncBadge('ok');
  }catch(e){
    console.error('Sync error:',e);
    updateSyncBadge('error');
  }
}

function updateSyncBadge(status){
  var el=document.getElementById('sync-badge');
  if(!el)return;
  if(status==='ok'){el.className='sync-badge';el.textContent='☁️ 已同步';}
  else if(status==='syncing'){el.className='sync-badge syncing';el.textContent='⏳ 同步中...';}
  else{el.className='sync-badge error';el.textContent='⚠️ 离线';}
}

function selEmoji(e){data.profile.avatarEmoji=e;data.profile.avatarType='emoji';
  var el=document.getElementById('edit-avatar');if(el)el.innerHTML=e;
  document.querySelectorAll('.avatar-opt').forEach(function(el){el.classList.remove('sel');});event.target.classList.add('sel');}
function uploadAvatar(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();
  reader.onload=function(ev){data.profile.avatar=ev.target.result;data.profile.avatarType='custom';
    var el=document.getElementById('edit-avatar');if(el)el.innerHTML='<img src="'+ev.target.result+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
    document.querySelectorAll('.avatar-opt').forEach(function(el){el.classList.remove('sel');});};reader.readAsDataURL(file);}
function selTitle(t){data.profile.title=t;showEditProfile();}
function saveProfile(){data.profile.name=document.getElementById('ep-name').value.trim()||data.profile.name;saveData();closeModal();renderProfile();toast('✅ 已保存');}
function toggleDark(){data.darkMode=!data.darkMode;saveData();applyTheme();renderProfile();}
function exportData(){var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='省中医工作站_'+today()+'.json';a.click();toast('📤 已导出');}
function importData(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();
  reader.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.logs){data=d;saveData();applyTheme();render();toast('✅ 已导入');closeModal();}else toast('格式错误');}catch(err){toast('解析失败');}};reader.readAsText(file);}

function fmtDate(ds){var p=ds.split('-');return parseInt(p[1])+'月'+parseInt(p[2])+'日';}
function weekName(ds){return['周日','周一','周二','周三','周四','周五','周六'][new Date(ds).getDay()];}
function shiftLabel(s){return{bedside:'🏥 床边班',night:'🌙 夜班',normal:'📋 正常班',rest:'😊 休息'}[s]||'😊 休息';}
function getMonthLogs(ym){var r=[];Object.keys(data.logs).forEach(function(k){if(k.startsWith(ym))r.push(data.logs[k]);});return r;}
function getRating(c){var t=[{min:0,max:10,t:'床边·启程',e:'🌱',n:11},{min:11,max:20,t:'床边·专精',e:'⚡',n:21},{min:21,max:30,t:'床边·卓越',e:'🔥',n:31},{min:31,max:40,t:'床边·宗师',e:'👑',n:41},{min:41,max:99999,t:'床边·传奇',e:'🏆',n:0}];
  var r=t[0];for(var i=0;i<t.length;i++)if(c>=t[i].min)r=t[i];
  var pct=r.max===99999?100:Math.min(100,((c-r.min)/(r.max-r.min+1))*100);return{title:r.t,emoji:r.e,pct:pct,next:r.n>0?r.n-c:0};}

// ===== INIT =====
(function(){
  initSupabase();
  applyTheme();
  // Load local data first for fast render
  data=loadDataLocal()||defaultData();
  // Check auth session
  checkSession().then(function(loggedIn){
    if(loggedIn){
      document.getElementById('login-page').classList.add('hide');
      document.getElementById('splash').classList.add('hide');
      document.getElementById('app').classList.add('show');
      // Load from cloud in background
      loadFromCloud().then(function(){
        applyTheme();
        render();
      });
      render();
    }else{
      // Show login page after splash
      setTimeout(function(){
        document.getElementById('splash').classList.add('hide');
        document.getElementById('login-page').style.display='flex';
      },2500);
    }
  });
  // Listen for auth state changes (magic link redirect)
  supabaseClient.auth.onAuthStateChange(function(event,session){
    if(event==='SIGNED_IN'&&session&&session.user){
      currentUser=session.user;
      document.getElementById('login-page').classList.add('hide');
      document.getElementById('app').classList.add('show');
      loadFromCloud().then(function(){applyTheme();render();});
      render();
    }
  });
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
  document.addEventListener('visibilitychange',function(){if(document.hidden)saveDataLocal();});
  // Online/offline detection
  window.addEventListener('online',function(){isOnline=true;updateSyncBadge('ok');syncToCloud();});
  window.addEventListener('offline',function(){isOnline=false;updateSyncBadge('error');});
})();

</script>
