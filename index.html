<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="个人床边工作量记录工作站">
<meta name="theme-color" content="#006B3F">
<title>个人床边工作量记录工作站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--green:#006B3F;--green2:#00875A;--green3:rgba(0,107,63,.08);--red:#C41230;--red2:#FF3B30;--orange:#FF9500;--blue:#007AFF;--purple:#AF52DE;--teal:#5AC8FA;--pink:#FF2D55;--bg:#F2F2F7;--card:rgba(255,255,255,.78);--card2:rgba(255,255,255,.5);--card-solid:#FFFFFF;--input:rgba(242,242,247,.8);--text:#1C1C1E;--text2:#8E8E93;--text3:#AEAEB2;--border:rgba(0,0,0,.06);--shadow:0 2px 16px rgba(0,0,0,.06);--shadow2:0 8px 32px rgba(0,0,0,.1);--radius:20px;--radius2:14px;--radius3:10px;--safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,0px);--glass:rgba(255,255,255,.65);--glass-border:rgba(255,255,255,.3);--blur:blur(20px);--tab-h:56px}
.dark{--bg:#000000;--card:rgba(28,28,30,.78);--card2:rgba(44,44,46,.5);--card-solid:#1C1C1E;--input:rgba(44,44,46,.8);--text:#FFFFFF;--text2:#98989F;--text3:#48484A;--border:rgba(255,255,255,.08);--shadow:0 2px 16px rgba(0,0,0,.3);--shadow2:0 8px 32px rgba(0,0,0,.4);--glass:rgba(28,28,30,.65);--glass-border:rgba(255,255,255,.08)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;transition:background .3s,color .3s}
body{background:linear-gradient(160deg,#e8f5e9 0%,#f1f8e9 30%,#fff8e1 100%)}
.dark body{background:linear-gradient(160deg,#0a1a0f 0%,#0d1f12 30%,#1a1a0a 100%)}
#splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#006B3F,#00875A);transition:opacity .6s,transform .6s}
#splash.hide{opacity:0;transform:scale(1.1);pointer-events:none}
#splash .logo{font-size:48px;margin-bottom:16px;animation:bounce 1s ease infinite}
#splash h1{color:#fff;font-size:22px;font-weight:800;letter-spacing:1px}
#splash p{color:rgba(255,255,255,.7);font-size:13px;margin-top:6px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#app{height:100%;display:flex;flex-direction:column;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
#app.show{opacity:1;transform:translateY(0)}
.view-header{padding:16px 20px 8px;padding-top:calc(var(--safe-top) + 16px)}
.view-title{font-size:28px;font-weight:900;letter-spacing:-.5px}
.view-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.view-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px}
.view-content::-webkit-scrollbar{display:none}
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid var(--glass-border);display:flex;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--text3);cursor:pointer;transition:color .2s;position:relative}
.tab-item.active{color:var(--green)}
.tab-item .tab-icon{font-size:22px;transition:transform .2s}
.tab-item.active .tab-icon{transform:scale(1.15)}
.tab-item.active::before{content:'';position:absolute;top:-1px;left:25%;right:25%;height:2px;background:var(--green);border-radius:2px}
.card{background:var(--card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.card:active{transform:scale(.98)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-item{background:var(--card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--radius2);padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-value{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;font-weight:600}
.rating-card{background:linear-gradient(135deg,var(--green),var(--green2));border-radius:var(--radius);padding:18px;color:#fff;text-align:center;margin-bottom:12px;box-shadow:var(--shadow2);position:relative;overflow:hidden}
.rating-card::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.rating-emoji{font-size:36px;margin-bottom:4px}
.rating-title{font-size:18px;font-weight:800}
.rating-count{font-size:12px;opacity:.85;margin-top:4px}
.rating-progress{height:4px;background:rgba(255,255,255,.2);border-radius:4px;margin-top:10px;overflow:hidden}
.rating-bar{height:100%;background:#fff;border-radius:4px;transition:width .6s ease}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:var(--radius3);font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;gap:6px}
.btn:active{transform:scale(.95)}
.btn-green{background:var(--green);color:#fff}
.btn-outline{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-red{background:var(--red);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.section-title{font-size:15px;font-weight:800;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.form-row{margin-bottom:10px}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;border-radius:var(--radius3);border:1px solid var(--border);background:var(--input);color:var(--text);font-size:15px;font-weight:500;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green)}
.form-textarea{min-height:60px;resize:vertical;font-family:inherit}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{width:100%;max-width:500px;max-height:85vh;background:var(--card-solid);border-radius:24px 24px 0 0;padding:20px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--text3);border-radius:4px;margin:0 auto 16px}
.modal-center .modal-sheet{border-radius:24px;margin:20px;max-height:80vh;transform:translateY(20px) scale(.95)}
.modal-center.open .modal-sheet{transform:translateY(0) scale(1)}
.progress-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .ring-bg{stroke:var(--border)}
.progress-ring .ring-fg{stroke:var(--green);transition:stroke-dashoffset .6s ease}
.progress-ring .ring-text{position:absolute;font-size:14px;font-weight:900;color:var(--green)}
.calorie-card{background:linear-gradient(135deg,#FF6B35,#FF9500);border-radius:var(--radius);padding:16px;color:#fff;margin-bottom:12px;box-shadow:var(--shadow2)}
.calorie-value{font-size:32px;font-weight:900}
.calorie-unit{font-size:13px;opacity:.8}
.calorie-equiv{font-size:12px;opacity:.75;margin-top:4px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius3);margin-bottom:6px;background:var(--card2);transition:all .2s;position:relative;overflow:hidden}
.check-item.done{opacity:.5}
.check-item.done .check-name{text-decoration:line-through}
.check-item.urgent{border-left:3px solid var(--red)}
.check-item.urgent .check-name::before{content:'🔴 ';font-size:10px}
.check-name{flex:1;font-size:14px;font-weight:600}
.check-tag{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:700}
.check-actions{display:flex;gap:4px}
.check-btn{width:28px;height:28px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;background:var(--card2);color:var(--text2);transition:all .15s}
.check-btn:active{transform:scale(.85)}
.check-btn.btn-done{background:var(--green);color:#fff}
.floor-group{margin-bottom:12px}
.floor-header{font-size:13px;font-weight:800;color:var(--text2);padding:6px 4px;display:flex;align-items:center;gap:6px}
.floor-header .floor-count{background:var(--green3);color:var(--green);padding:1px 8px;border-radius:10px;font-size:11px}
.meal-banner{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#FF9500,#FF6B00);border-radius:var(--radius);padding:14px;color:#fff;margin-bottom:12px}
.meal-banner .info{flex:1}
.meal-banner .title{font-weight:800;font-size:15px}
.meal-banner .time{font-size:12px;opacity:.8}
.btn-end{padding:8px 16px;border-radius:10px;background:rgba(255,255,255,.2);color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer}
.empty-state{text-align:center;padding:32px 16px}
.empty-state .emoji{font-size:40px;margin-bottom:8px}
.empty-state .text{font-size:14px;color:var(--text2)}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.tag-green{background:var(--green3);color:var(--green)}
.tag-orange{background:rgba(255,149,0,.12);color:var(--orange)}
.tag-red{background:rgba(196,18,48,.1);color:var(--red)}
.tag-blue{background:rgba(0,122,255,.1);color:var(--blue)}
.tag-purple{background:rgba(175,82,222,.1);color:var(--purple)}
.achieve-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.achieve-card{background:var(--card);backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--radius2);padding:14px 8px;text-align:center;box-shadow:var(--shadow);transition:transform .2s}
.achieve-card.locked{opacity:.4;filter:grayscale(1)}
.achieve-card .ach-icon{font-size:28px;margin-bottom:4px}
.achieve-card .ach-name{font-size:11px;font-weight:700}
.achieve-card .ach-desc{font-size:10px;color:var(--text2);margin-top:2px}
.achieve-card .ach-date{font-size:9px;color:var(--text3);margin-top:2px}
.achieve-title-card{background:linear-gradient(135deg,#FFD700,#FFA000);border-radius:var(--radius);padding:20px;color:#fff;text-align:center;margin-bottom:16px;box-shadow:var(--shadow2)}
.achieve-title-card .ach-icon{font-size:48px}
.achieve-title-card .ach-name{font-size:20px;font-weight:900;margin-top:4px}
.achieve-title-card .ach-progress{font-size:12px;opacity:.8;margin-top:4px}
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card-solid);color:var(--text);padding:10px 20px;border-radius:var(--radius3);font-size:14px;font-weight:600;box-shadow:var(--shadow2);z-index:999;transition:transform .3s cubic-bezier(.32,.72,0,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.cal-hd{text-align:center;font-size:11px;font-weight:700;color:var(--text2);padding:6px 0}
.cal-day{text-align:center;padding:8px 4px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.cal-day:active{transform:scale(.9)}
.cal-day.today{background:var(--green);color:#fff}
.cal-day.rest{color:var(--text3)}
.cal-day.work{background:var(--green3);color:var(--green)}
.cal-day.selected{box-shadow:0 0 0 2px var(--green)}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card2);border-radius:var(--radius3);margin-bottom:8px}
.contact-item .c-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.contact-item .c-name{font-size:14px;font-weight:700}
.contact-item .c-phone{font-size:12px;color:var(--text2)}
.note-item{padding:12px;background:var(--card2);border-radius:var(--radius3);margin-bottom:8px;font-size:13px;line-height:1.5}
.note-item .note-time{font-size:11px;color:var(--text3);margin-top:4px}
.report-card{background:var(--card);backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.report-card h3{font-size:14px;font-weight:800;margin-bottom:10px}
.report-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.report-row:last-child{border:none}
.report-row .label{color:var(--text2)}
.report-row .value{font-weight:700}
.quick-input{display:flex;gap:8px;margin-bottom:12px}
.quick-input input{flex:1}
.batch-area{margin-bottom:12px}
.batch-area textarea{width:100%;min-height:100px;padding:12px;border-radius:var(--radius3);border:1px solid var(--border);background:var(--input);color:var(--text);font-size:14px;font-family:inherit;resize:vertical}
.batch-hint{font-size:11px;color:var(--text2);margin-top:4px}
.marker-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.marker-chip{padding:4px 10px;border-radius:16px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card2);cursor:pointer;transition:all .15s}
.marker-chip.selected{border-color:var(--green);background:var(--green3);color:var(--green)}
.quality-stars{display:flex;gap:4px}
.quality-star{font-size:24px;cursor:pointer;transition:transform .15s}
.quality-star:active{transform:scale(1.3)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeInUp .3s ease both}
.animate-in:nth-child(2){animation-delay:.05s}
.animate-in:nth-child(3){animation-delay:.1s}
.animate-in:nth-child(4){animation-delay:.15s}
.animate-in:nth-child(5){animation-delay:.2s}
</style>
</head>
<body>
<div id="splash"><div class="logo">🏥</div><h1>个人床边工作量记录工作站</h1><p>v3.0 · Lyon</p></div>
<div id="app"></div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal-sheet" id="modal-content"></div></div>
<div class="toast" id="toast"></div>
<script>
var FLOORS=[{id:'6F',name:'手术室'},{id:'8F',name:'重症医学科(ICU)'},{id:'9F',name:'静脉配置中心 输血科'},{id:'10F',name:'脊柱微创科'},{id:'11F',name:'老年骨折科 运动医学科'},{id:'12F',name:'创伤足踝科 膝骨关节病科'},{id:'13F',name:'外四科(胰腺中心) 外五科(肛肠科)'},{id:'14F',name:'外二科(胃肠外科) 外三科(结直肠外科)'},{id:'15F',name:'乳腺一科(乳腺修复整形科) 乳腺二科(乳腺肿瘤科)'},{id:'16F',name:'妇科'},{id:'17F',name:'肝胆外科'},{id:'18F',name:'耳鼻咽喉头颈科 眼科'},{id:'19F',name:'儿科 皮肤科'},{id:'20F',name:'神经内科 介入科'},{id:'21F',name:'脾胃病科 内分泌科'},{id:'22F',name:'针灸科'},{id:'23F',name:'肾病科'},{id:'24F',name:'呼吸病科(PCCM) 心胸外科'},{id:'25F',name:'神经外科 神经重症科'},{id:'26F',name:'心血管科 心律失常科'},{id:'27F',name:'脑血管病科'},{id:'28F',name:'肿瘤科'},{id:'29F',name:'血液科'}];
var MARKERS=['肥胖','水肿','骨科固定物','不能配合','婴幼儿','引流管','起搏器'];
var QUALITY_LABELS=['','⭐ 一般','⭐⭐ 良好','⭐⭐⭐ 优秀'];
var state={tab:'work',calMonth:'',addMode:'single'};
var data={logs:{},profile:{name:'',height:0,weight:0,hospital:'',dept:''},favorites:[],contacts:[{name:'ICU',phone:'',icon:'🏥'},{name:'急诊科',phone:'',icon:'🚑'},{name:'3F 外科',phone:'',icon:'🔪'}],notes:[],handover:'',achievements:{}};

function today(){return new Date().toISOString().slice(0,10);}
function loadData(){try{var s=localStorage.getItem('gdhtcm_data');if(s){var d=JSON.parse(s);data.logs=d.logs||{};data.profile=Object.assign(data.profile,d.profile||{});data.favorites=d.favorites||[];data.contacts=d.contacts||data.contacts;data.notes=d.notes||[];data.handover=d.handover||'';data.achievements=d.achievements||{};}}catch(e){}}
function saveData(){try{localStorage.setItem('gdhtcm_data',JSON.stringify(data));}catch(e){}}
function getLog(day){if(!data.logs[day])data.logs[day]={shift:'rest',count:0,taxMode:false,patients:[],mealBreak:null,_timerStart:null,_timerPaused:false,_timerElapsed:0};return data.logs[day];}
function applyTheme(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');}
function toggleTheme(){var d=document.documentElement.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');render();}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function openModal(html,center){var m=document.getElementById('modal');var c=document.getElementById('modal-content');c.innerHTML='<div class="modal-handle"></div>'+html;if(center)m.classList.add('modal-center');else m.classList.remove('modal-center');m.classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function fmtDate(ds){var p=ds.split('-');return parseInt(p[1])+'月'+parseInt(p[2])+'日';}
function monthDays(ym){var p=ym.split('-');return new Date(p[0],p[1],0).getDate();}
function monthLogs(ym){var r=[];Object.keys(data.logs).forEach(function(k){if(k.startsWith(ym))r.push(data.logs[k]);});return r;}
function allLogs(){return Object.keys(data.logs).sort();}

// ===== TIMER =====
function workTimerRunning(){var l=getLog(today());return !!l._timerStart&&!l._timerPaused;}
function workTimerSeconds(){var l=getLog(today());if(!l._timerStart)return 0;if(l._timerPaused)return l._timerElapsed||0;return l._timerElapsed+(Date.now()-l._timerStart)/1000;}
function formatTimer(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return(h?h+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function toggleWorkTimer(){var l=getLog(today());if(!l._timerStart||l._timerPaused){l._timerStart=Date.now();l._timerPaused=false;if(!l._timerElapsed)l._timerElapsed=0;toast('▶ 计时开始');}else{l._timerElapsed=workTimerSeconds();l._timerPaused=true;l._timerStart=null;toast('⏸ 已暂停');}saveData();render();}
function resetWorkTimer(){var l=getLog(today());l._timerStart=null;l._timerPaused=false;l._timerElapsed=0;saveData();render();toast('计时已重置');}
var _timerInterval=null;
function startTimerTick(){if(_timerInterval)clearInterval(_timerInterval);_timerInterval=setInterval(function(){if(state.tab==='work'&&workTimerRunning()){var el=document.getElementById('timer-display');if(el)el.textContent=formatTimer(workTimerSeconds());}},1000);}

// ===== QUICK ADD =====
function quickAdd(n){var l=getLog(today());l.count=(l.count||0)+n;saveData();render();toast('✅ +'+n+' 床边');}

// ===== STREAK =====
function calcStreak(){var streak=0,d=new Date();while(true){var ds=d.toISOString().slice(0,10);var l=data.logs[ds];if(l&&l.shift!=='rest'){streak++;d.setDate(d.getDate()-1);}else break;}return streak;}

// ===== CALORIE =====
function calcCalorie(){var l=getLog(today());var w=data.profile.weight||65;var pts=l.patients||[];var done=pts.filter(function(p){return p.status==='done';});
var floors=new Set(done.map(function(p){return p.floor;}));
var timerSec=workTimerSeconds();
var workMin=Math.max(timerSec/60,done.length*8);
var pushMin=done.length*3;var opMin=done.length*5;var waitMin=Math.max(0,workMin-pushMin-opMin);
var cal=(4.0*w*pushMin/60)+(2.5*w*opMin/60)+(1.8*w*waitMin/60);
cal+=floors.size*w*0.02*done.length;
return Math.round(cal);}
function calorieEquiv(cal){var rice=Math.round(cal/116);var tea=Math.round(cal/360);return '≈ '+rice+' 碗米饭 · ≈ '+tea+' 杯奶茶';}

]:[

  {min:31,max:60,t:'床边学徒',e:'📖',n:61},
  {min:61,max:90,t:'床边能手',e:'💪',n:91},
  {min:91,max:120,t:'床边精英',e:'⚡',n:121},
  {min:121,max:180,t:'床边大师',e:'🔥',n:181},

  {min:241,max:99999,t:'床边小王子',e:'🏆',n:0}
];
var r=t[0];for(var i=0;i<t.length;i++)if(c>=t[i].min)r=t[i];

return{title:r.t,emoji:r.e,pct:pct,next:r.n>0?r.n-c:0};
}

function totalDone(){var t=0;Object.values(data.logs).forEach(function(l){t+=(l.count||0);});return t;}
function monthTotal(ym){var t=0;Object.keys(data.logs).forEach(function(k){if(k.startsWith(ym))t+=(data.logs[k].count||0);});return t;}
function yearTotal(y){var t=0;Object.keys(data.logs).forEach(function(k){if(k.startsWith(y))t+=(data.logs[k].count||0);});return t;}
function checkZeroError(){var streak=0;Object.keys(data.logs).sort().forEach(function(k){var l=data.logs[k];(l.patients||[]).forEach(function(p){if(p.quality===3)streak++;else streak=0;});});return streak>=50;}

function getYearRating(y){var c=yearTotal(y);var r=YEAR_ACH[0];for(var i=0;i<YEAR_ACH.length;i++)if(c>=YEAR_ACH[i].min)r=YEAR_ACH[i];return r;}

// ===== BATCH ADD =====
function expandBeds(text){
var beds=[];
text.split('\n').forEach(function(line){
  line=line.trim();if(!line)return;
  var m=line.match(/^(.+?)[\-~～](\d+)$/);
  if(m){
    var prefix=m[1];var end=parseInt(m[2]);
    var startMatch=prefix.match(/(\d+)$/);
    if(startMatch){var start=parseInt(startMatch[1]);var pre=prefix.slice(0,-startMatch[1].length);
      for(var i=start;i<=end;i++)beds.push(pre+i+'床');}
    else beds.push(line);
  }else beds.push(line);
});
return beds;
}

h+='</div></div>';

// Quick add

// Streak

if(streak>0){h+='<div class="card animate-in" style="padding:12px 14px;background:linear-gradient(135deg,#FF9500,#FF6B00);color:#fff;border:none"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:28px">🔥</div><div style="flex:1"><div style="font-size:15px;font-weight:800">连续 '+streak+' 天出勤</div><div style="font-size:11px;opacity:.8">坚持就是胜利！</div></div></div></div>';}

  h+='<button class="btn-end" onclick="endMeal()">结束休息</button></div>';}

// Handover reminder
if(data.handover){h+='<div class="card animate-in" style="padding:12px 14px;border-left:3px solid var(--orange)"><div style="font-size:12px;font-weight:700;color:var(--orange);margin-bottom:4px">📝 交接备忘</div><div style="font-size:13px;color:var(--text2)">'+data.handover+'</div></div>';}

  var groups={};

  // Sort: urgent first
  Object.keys(groups).forEach(function(k){groups[k].sort(function(a,b){return(b.p.urgent?1:0)-(a.p.urgent?1:0);});});
  var floorOrder=FLOORS.map(function(f){return f.id;});

      h+='<button class="check-btn" onclick="event.stopPropagation();rmPt('+i+')" style="color:var(--red)">×</button>';
      h+='</div></div>';
    });
    h+='</div>';
  });
  // Ungrouped
  Object.keys(groups).forEach(function(floor){if(floorOrder.indexOf(floor)===-1){
    var items=groups[floor];
    h+='<div class="floor-group animate-in"><div class="floor-header">📍 '+floor+' <span class="floor-count">'+items.length+'项</span></div>';

      h+='<button class="check-btn" onclick="event.stopPropagation();rmPt('+i+')" style="color:var(--red)">×</button></div></div>';});
    h+='</div>';
  }});
}
return h;

}

// ===== CHECK ACHIEVEMENTS =====
function checkAchievements(){
SPECIAL_ACH.forEach(function(a){
  if(!data.achievements[a.id]&&a.check()){
    data.achievements[a.id]=new Date().toLocaleString('zh-CN');
    toast('🎉 解锁成就：'+a.t);
  }
});
saveData();
}

// ===== INIT =====
(function(){
  loadData();
  applyTheme();
  state.calMonth=today().slice(0,7);
  state.addMode='single';
  setTimeout(function(){
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('show');
    render();
    if(!data._onboarded)setTimeout(function(){showOnboarding();},500);
  },2500);
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
  document.addEventListener('visibilitychange',function(){if(document.hidden){saveData();checkAchievements();}});
  setInterval(checkAchievements,60000);
})();
</script>
</body>
</html>
